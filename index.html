<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>소요도서관 특보 — 책도둑을 잡아라!</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f5f4f0;--bg3:#e8e6e2;
  --text:#1a1a1a;--text2:#666;--text3:#aaa;
  --b1:rgba(0,0,0,.12);--b2:rgba(0,0,0,.22);
  --r:10px;--rl:14px;
  --ok-bg:#eaf3de;--ok-t:#3b6d11;--ok-b:#639922;
  --ng-bg:#fcebeb;--ng-t:#a32d2d;--ng-b:#e24b4a;
  --hl-bg:#e6f1fb;--hl-t:#185fa5;--hl-b:#378add;
  --am-bg:#faeeda;--am-t:#854f0b;--am-b:#ba7517;
  --pu-bg:#eeedfe;--pu-t:#3c3489;--pu-b:#7f77dd;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1e;--bg2:#272727;--bg3:#323232;
  --text:#f0f0f0;--text2:#999;--text3:#555;
  --b1:rgba(255,255,255,.09);--b2:rgba(255,255,255,.18);
  --ok-bg:#1a2e10;--ok-t:#8fc95e;--ok-b:#639922;
  --ng-bg:#2e1010;--ng-t:#f09595;--ng-b:#a32d2d;
  --hl-bg:#0c1e35;--hl-t:#85b7eb;--hl-b:#185fa5;
  --am-bg:#2a1e08;--am-t:#fac775;--am-b:#ba7517;
  --pu-bg:#1c1a3e;--pu-t:#afa9ec;--pu-b:#7f77dd;
}}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg2);color:var(--text);min-height:100vh;padding:1rem}
#app{max-width:640px;margin:0 auto;background:var(--bg);
  border-radius:var(--rl);padding:1.5rem;border:.5px solid var(--b1)}

.hdr{border-top:3px solid var(--text);border-bottom:1.5px solid var(--text);
  text-align:center;padding:6px 0;margin-bottom:1.25rem}
.hdr-ttl{font-size:21px;font-weight:700;letter-spacing:2px}
.hdr-sub{font-size:11px;color:var(--text2);margin-top:2px}

.scr{display:none}.scr.on{display:block}
.qscr{display:none}.qscr.on{display:block}

/* 시작 */
.start-wrap{text-align:center;padding:1rem 0}
.start-dog{width:130px;height:130px;margin:0 auto 1rem;border-radius:var(--rl);overflow:hidden;border:.5px solid var(--b2)}
.start-ttl{font-size:18px;font-weight:700;margin-bottom:8px}
.start-desc{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:1.25rem}
.diff-row{display:flex;gap:8px;justify-content:center;margin-bottom:1.25rem;flex-wrap:wrap}
.diff-btn{border:.5px solid var(--b2);border-radius:var(--r);padding:9px 16px;
  font-size:13px;cursor:pointer;background:var(--bg);color:var(--text);
  text-align:center;line-height:1.5;transition:all .15s}
.diff-btn:hover{background:var(--bg2)}
.diff-btn.selected{background:var(--text);color:var(--bg);border-color:var(--text)}
.diff-small{font-size:11px;display:block;opacity:.7}
.start-btn{border:none;border-radius:var(--r);padding:13px 36px;
  font-size:16px;font-weight:700;cursor:pointer;background:var(--text);color:var(--bg)}
.start-btn:hover{opacity:.85}

/* 상태바 */
.statusbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;
  padding:.65rem .9rem;background:var(--bg2);border-radius:var(--r);border:.5px solid var(--b1)}
.lives{display:flex;gap:3px}
.heart{font-size:15px;transition:transform .2s,opacity .3s}
.heart.lost{opacity:.22;transform:scale(.75)}
.combo-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;
  background:var(--pu-bg);color:var(--pu-t);border:.5px solid var(--pu-b);
  opacity:0;transition:opacity .3s;white-space:nowrap}
.combo-badge.on{opacity:1}
.timer-wrap{margin-left:auto;display:flex;align-items:center;gap:5px}
.timer-arc{transform:rotate(-90deg)}
.timer-num{font-size:14px;font-weight:700;min-width:26px;text-align:right;font-variant-numeric:tabular-nums}
.timer-num.warn{color:var(--ng-t)}

/* 패널 */
.panel{border:.5px solid var(--b2);border-radius:var(--rl);padding:1rem 1.15rem;margin-bottom:1rem}
.panel-top{display:flex;gap:1rem;align-items:flex-start}
.panel-info{flex:1;min-width:0}
.panel-badge{display:inline-block;font-size:10px;letter-spacing:.8px;padding:2px 8px;
  border-radius:99px;background:var(--ng-bg);color:var(--ng-t);
  border:.5px solid var(--ng-b);margin-bottom:5px}
.panel-name{font-size:14px;font-weight:600;margin-bottom:3px}
.panel-desc{font-size:12px;color:var(--text2);line-height:1.45}
#mz-wrap{position:relative;width:96px;min-width:96px;height:96px;
  border-radius:var(--r);overflow:hidden;border:.5px solid var(--b2);flex-shrink:0}
#mz-svg,#mz-svg svg{position:absolute;inset:0;width:100%;height:100%}
#mz-grid{position:absolute;inset:0;display:grid;
  grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr)}
.mz{background:var(--bg3);border:.5px solid var(--b1);transition:opacity .5s ease}
.mz.gone{opacity:0;pointer-events:none}

.prog-row{display:flex;align-items:center;gap:8px;margin-top:.7rem}
.prog-lbl{font-size:11px;color:var(--text2);white-space:nowrap}
.prog-wrap{flex:1;height:5px;background:var(--bg3);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:var(--text);border-radius:99px;transition:width .35s}
.prog-pts{font-size:12px;font-weight:700;min-width:38px;text-align:right}

/* 문제 */
.q-meta{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.q-no{font-size:11px;color:var(--text3)}
.q-tag{font-size:10px;padding:2px 8px;border-radius:99px;border:.5px solid var(--b2);color:var(--text2)}
.q-text{font-size:16px;font-weight:500;line-height:1.6;border-left:3px solid var(--text);
  padding-left:12px;margin-bottom:.9rem;white-space:pre-line}
.fb{display:none;border-radius:var(--r);padding:10px 14px;
  font-size:13px;line-height:1.55;margin-bottom:.85rem}
.fb.on{display:block}
.fb.ok{background:var(--ok-bg);color:var(--ok-t);border:.5px solid var(--ok-b)}
.fb.ng{background:var(--ng-bg);color:var(--ng-t);border:.5px solid var(--ng-b)}

.choices{display:grid;gap:7px;margin-bottom:.85rem}
.cbtn{border:.5px solid var(--b2);border-radius:var(--r);padding:11px 14px;
  font-size:14px;text-align:left;cursor:pointer;background:var(--bg);
  color:var(--text);line-height:1.4;transition:background .1s}
.cbtn:hover:not(:disabled){background:var(--bg2)}
.cbtn.ok{border-color:var(--ok-b);background:var(--ok-bg);color:var(--ok-t)}
.cbtn.ng{border-color:var(--ng-b);background:var(--ng-bg);color:var(--ng-t)}
.cbtn:disabled{cursor:default}

.nbtn{border:.5px solid var(--b2);border-radius:var(--r);padding:10px 22px;
  font-size:14px;cursor:pointer;background:var(--bg);color:var(--text)}
.nbtn:hover:not(:disabled){background:var(--bg2)}
.nbtn:disabled{opacity:.35;cursor:default}

.blank-row{display:flex;gap:8px;align-items:center;margin-bottom:.85rem;flex-wrap:wrap}
.blank-inp{border:.5px solid var(--b2);border-radius:var(--r);padding:9px 13px;
  font-size:15px;background:var(--bg);color:var(--text);flex:1;min-width:90px}
.blank-inp:focus{outline:none;border-color:var(--hl-b)}

.card-area{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;margin-bottom:.7rem}
.crd{border:.5px solid var(--b2);border-radius:var(--r);padding:9px 6px;font-size:12px;
  text-align:center;cursor:pointer;background:var(--bg);color:var(--text);
  min-height:52px;display:flex;align-items:center;justify-content:center;
  line-height:1.35;transition:background .1s,border-color .1s}
.crd:hover:not(.matched):not(.sel){background:var(--bg2)}
.crd.sel{border-color:var(--hl-b);background:var(--hl-bg);color:var(--hl-t)}
.crd.matched{border-color:var(--ok-b);background:var(--ok-bg);color:var(--ok-t);cursor:default}
.crd.bad{border-color:var(--ng-b);background:var(--ng-bg);color:var(--ng-t)}
.card-status{font-size:12px;color:var(--text2);margin-bottom:.6rem;min-height:18px}

/* 애니메이션 */
#anim-overlay{position:fixed;inset:0;pointer-events:none;
  display:flex;align-items:center;justify-content:center;z-index:100}
.anim-pop{font-size:60px;opacity:0;transform:scale(.3);position:absolute;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),opacity .22s}
.anim-pop.show{opacity:1;transform:scale(1)}
.anim-pop.hide{opacity:0;transform:scale(1.5) translateY(-30px);transition:all .3s ease-in}

#combo-pop{position:fixed;top:18%;left:50%;transform:translateX(-50%) scale(0);
  background:var(--pu-bg);color:var(--pu-t);border:.5px solid var(--pu-b);
  border-radius:var(--rl);padding:9px 24px;font-size:18px;font-weight:700;
  z-index:101;transition:transform .28s cubic-bezier(.34,1.56,.64,1),opacity .28s;
  opacity:0;pointer-events:none;white-space:nowrap}
#combo-pop.show{transform:translateX(-50%) scale(1);opacity:1}
#combo-pop.hide{transform:translateX(-50%) scale(.8) translateY(-16px);opacity:0}

#bonus-pop{position:fixed;top:36%;left:50%;transform:translateX(-50%);
  font-size:20px;font-weight:700;color:var(--pu-t);opacity:0;
  pointer-events:none;z-index:102;white-space:nowrap}

@keyframes shake{
  0%{transform:translateX(0)} 20%{transform:translateX(-7px)}
  40%{transform:translateX(7px)} 60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)} 100%{transform:translateX(0)}}
.shake{animation:shake .38s ease}

/* 게임오버 */
.gameover-wrap{text-align:center;padding:1.5rem 0}
.go-icon{font-size:52px;margin-bottom:.75rem}
.go-ttl{font-size:20px;font-weight:700;margin-bottom:6px}
.go-desc{font-size:13px;color:var(--text2);margin-bottom:1.25rem;line-height:1.65;white-space:pre-line}

/* 결과 */
.result-wrap{text-align:center;padding:1.25rem 0}
.result-dog{width:128px;height:128px;margin:0 auto 1rem;border-radius:var(--rl);
  overflow:hidden;border:.5px solid var(--b2)}
.result-dog svg{width:100%;height:100%}
.result-headline{font-size:17px;font-weight:700;margin-bottom:4px}
.result-pts{font-size:13px;color:var(--text2);margin-bottom:.85rem}
.rank-badge{display:inline-block;font-size:22px;font-weight:700;
  padding:7px 26px;border-radius:var(--rl);margin-bottom:.9rem;letter-spacing:1px}
.rank-S{background:#faeeda;color:#854f0b;border:.5px solid #ba7517}
.rank-A{background:#eaf3de;color:#3b6d11;border:.5px solid #639922}
.rank-B{background:#e6f1fb;color:#185fa5;border:.5px solid #378add}
.rank-C{background:#eeedfe;color:#3c3489;border:.5px solid #7f77dd}
.rank-D{background:var(--bg2);color:var(--text2);border:.5px solid var(--b2)}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:.75rem 0 1rem}
.stat-box{background:var(--bg2);border-radius:var(--r);padding:.65rem .5rem;text-align:center}
.stat-val{font-size:18px;font-weight:700}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.result-reveal{font-size:13px;line-height:1.65;max-width:380px;margin:.4rem auto 1.15rem;
  padding:12px 16px;background:var(--am-bg);color:var(--am-t);
  border-radius:var(--r);border:.5px solid var(--am-b)}

/* 이름 입력 */
.name-wrap{text-align:center;padding:1.5rem 0}
.name-ttl{font-size:17px;font-weight:700;margin-bottom:6px}
.name-desc{font-size:13px;color:var(--text2);margin-bottom:1.25rem;line-height:1.6}
.name-inp{border:.5px solid var(--b2);border-radius:var(--r);padding:11px 16px;
  font-size:16px;background:var(--bg);color:var(--text);
  width:100%;max-width:280px;text-align:center;display:block;margin:0 auto 1rem}
.name-inp:focus{outline:none;border-color:var(--hl-b)}
.name-err{font-size:12px;color:var(--ng-t);margin-bottom:.75rem;min-height:18px}

/* 랭킹 */
.lb-wrap{margin-top:1rem}
.lb-title{font-size:13px;font-weight:700;margin-bottom:.6rem;
  display:flex;align-items:center;gap:6px}
.lb-list{display:grid;gap:5px}
.lb-row{display:flex;align-items:center;gap:10px;padding:8px 12px;
  border-radius:var(--r);border:.5px solid var(--b1);background:var(--bg2);
  font-size:13px}
.lb-row.me{border-color:var(--hl-b);background:var(--hl-bg);color:var(--hl-t)}
.lb-row.top1{border-color:var(--am-b);background:var(--am-bg);color:var(--am-t)}
.lb-rank{font-weight:700;min-width:22px;text-align:center}
.lb-name{flex:1;font-weight:500}
.lb-score{font-variant-numeric:tabular-nums;font-weight:700}
.lb-diff{font-size:11px;opacity:.7;margin-left:4px}
.lb-empty{font-size:13px;color:var(--text3);text-align:center;padding:.75rem 0}
.my-rank-box{margin:.75rem 0;padding:10px 14px;border-radius:var(--r);
  background:var(--hl-bg);color:var(--hl-t);border:.5px solid var(--hl-b);
  font-size:14px;font-weight:600;text-align:center}
.lb-clear{font-size:11px;color:var(--text3);cursor:pointer;
  background:none;border:none;padding:0;margin-top:.5rem;display:block;margin-left:auto}
.lb-clear:hover{color:var(--ng-t)}
.admin-only{display:none!important}
body.admin .admin-only{display:block!important}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-ttl">소요도서관 특보</div>
    <div class="hdr-sub">특별수사대 — 책도둑을 잡아라!</div>
  </div>

  <!-- 시작 (랭킹 + 이름입력 + 난이도 통합) -->
  <div class="scr on" id="s-start">

    <!-- 헤더 -->
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.1rem">
      <div class="start-dog" id="start-dog" style="width:64px;height:64px;min-width:64px;border-radius:var(--r)"></div>
      <div style="text-align:left">
        <div class="start-ttl" style="font-size:16px;margin-bottom:3px">📚 수상한 책도둑 출현!</div>
        <p style="font-size:12px;color:var(--text2);line-height:1.5">
          퀴즈를 풀어 단서를 모으고 책도둑의 정체를 밝혀봐요!<br>
          <span style="color:var(--text3)">총 10문제 · OX / 빈칸 / 카드 / 기자미션</span>
        </p>
      </div>
    </div>

    <!-- 현재 랭킹 미리보기 -->
    <div class="lb-wrap" style="margin-bottom:1.1rem">
      <div class="lb-title"><span id="start-lb-title">🏆 현재 랭킹</span>
        <button class="lb-clear admin-only" onclick="clearLeaderboardFromStart()">기록 초기화</button>
      </div>
      <div class="lb-list" id="start-lb-list"></div>
    </div>

    <!-- 이름 입력 -->
    <p style="font-size:12px;font-weight:600;margin-bottom:7px">내 이름 입력</p>
    <div style="display:flex;gap:8px;margin-bottom:6px">
      <input class="name-inp" id="name-inp"
        placeholder="예) 김소요  (최대 8자)"
        maxlength="8"
        style="margin:0;text-align:left;flex:1;max-width:none"/>
    </div>
    <div class="name-err" id="name-err" style="margin-bottom:.75rem"></div>

    <!-- 난이도 -->
    <p style="font-size:12px;font-weight:600;margin-bottom:7px">난이도 선택</p>
    <div class="diff-row" style="margin-bottom:1.1rem;justify-content:flex-start">
      <button class="diff-btn selected" id="diff-easy" onclick="setDiff('easy')">
        쉬움 ❤️×5<span class="diff-small">타이머 없음</span>
      </button>
      <button class="diff-btn" id="diff-normal" onclick="setDiff('normal')">
        보통 ❤️×3<span class="diff-small">30초 타이머</span>
      </button>
      <button class="diff-btn" id="diff-hard" onclick="setDiff('hard')">
        어려움 ❤️×1<span class="diff-small">15초 타이머</span>
      </button>
    </div>

    <button class="start-btn" style="width:100%" onclick="confirmName()">수사 시작! 🔍</button>
  </div>

  <!-- 게임 -->
  <div class="scr" id="s-game">
    <div class="statusbar">
      <div class="lives" id="lives"></div>
      <div class="combo-badge" id="combo-badge"></div>
      <div class="timer-wrap" id="timer-wrap" style="display:none">
        <svg width="26" height="26" viewBox="0 0 26 26">
          <circle cx="13" cy="13" r="10" fill="none" stroke="var(--b1)" stroke-width="2.5"/>
          <circle id="timer-arc" cx="13" cy="13" r="10" fill="none"
            stroke="var(--text)" stroke-width="2.5"
            stroke-dasharray="62.8" stroke-dashoffset="0"
            stroke-linecap="round" class="timer-arc"/>
        </svg>
        <span class="timer-num" id="timer-num">30</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-top">
        <div class="panel-info">
          <div class="panel-badge">용의자</div>
          <div class="panel-name" id="p-name"></div>
          <div class="panel-desc" id="p-desc"></div>
        </div>
        <div id="mz-wrap">
          <div id="mz-svg"></div>
          <div id="mz-grid"></div>
        </div>
      </div>
      <div class="prog-row">
        <div class="prog-lbl" id="prog-lbl">0 / 10</div>
        <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <div class="prog-pts" id="prog-pts">0pt</div>
      </div>
    </div>

    <!-- OX -->
    <div class="qscr" id="qscr-ox">
      <div class="q-meta"><span class="q-no" id="ox-no"></span><span class="q-tag">OX 퀴즈</span></div>
      <div class="q-text" id="ox-q"></div>
      <div class="choices">
        <button class="cbtn" id="ox-o" onclick="ansOX(true)">⭕ 맞아요</button>
        <button class="cbtn" id="ox-x" onclick="ansOX(false)">❌ 틀려요</button>
      </div>
      <div class="fb" id="ox-fb"></div>
      <button class="nbtn" id="ox-nxt" onclick="next()" disabled>다음 →</button>
    </div>

    <!-- 빈칸 -->
    <div class="qscr" id="qscr-blank">
      <div class="q-meta"><span class="q-no" id="bl-no"></span><span class="q-tag">빈칸 채우기</span></div>
      <div class="q-text" id="bl-q"></div>
      <div class="blank-row">
        <input class="blank-inp" id="bl-inp" placeholder="정답을 써요"/>
        <button class="nbtn" id="bl-check" onclick="ansBlank()">확인</button>
      </div>
      <div class="fb" id="bl-fb"></div>
      <button class="nbtn" id="bl-nxt" onclick="next()" style="display:none">다음 →</button>
    </div>

    <!-- 카드 -->
    <div class="qscr" id="qscr-card">
      <div class="q-meta"><span class="q-no" id="cd-no"></span><span class="q-tag">카드 짝 맞추기</span></div>
      <div class="q-text" style="font-size:14px;border-left:3px solid var(--text);padding-left:12px;margin-bottom:.9rem">
        짝꿍 카드를 찾아요! 책도둑이 뒤섞어 놨어요 😤
      </div>
      <div class="card-area" id="cd-area"></div>
      <div class="card-status" id="cd-status"></div>
      <div class="fb" id="cd-fb"></div>
      <button class="nbtn" id="cd-nxt" onclick="next()" style="display:none">다음 →</button>
    </div>

    <!-- 기자미션 -->
    <div class="qscr" id="qscr-mission">
      <div class="q-meta"><span class="q-no" id="ms-no"></span><span class="q-tag">기자 미션</span></div>
      <div class="q-text" id="ms-story"></div>
      <div class="choices" id="ms-choices"></div>
      <div class="fb" id="ms-fb"></div>
      <button class="nbtn" id="ms-nxt" onclick="next()" disabled>다음 →</button>
    </div>
  </div>

  <!-- 게임오버 -->
  <div class="scr" id="s-gameover">
    <div class="gameover-wrap">
      <div class="go-icon">💔</div>
      <div class="go-ttl">수사 실패!</div>
      <div class="go-desc" id="go-desc"></div>
      <button class="nbtn" onclick="restartGame()">다시 도전하기 🔍</button>
    </div>
  </div>

  <!-- 결과 -->
  <div class="scr" id="s-result">
    <div class="result-wrap">
      <div class="result-dog" id="res-dog"></div>
      <div class="result-headline" id="res-headline"></div>
      <div class="result-pts" id="res-pts"></div>
      <div class="rank-badge" id="res-rank"></div>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-val" id="st-correct"></div>
          <div class="stat-lbl">정답 수</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="st-combo"></div>
          <div class="stat-lbl">최고 콤보</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="st-bonus"></div>
          <div class="stat-lbl">보너스 점수</div>
        </div>
      </div>
      <div class="result-reveal" id="res-reveal"></div>
      <div class="my-rank-box" id="my-rank-box" style="display:none"></div>
      <div class="lb-wrap">
        <div class="lb-title"><span>🏆 이 기기 랭킹</span>
          <button class="lb-clear admin-only" onclick="clearLeaderboard()">기록 초기화</button>
        </div>
        <div class="lb-list" id="lb-list"></div>
      </div>
      <button class="nbtn" onclick="restartGame()" style="margin-top:1rem">다시 수사하기 🔍</button>
    </div>
  </div>
</div>

<div id="anim-overlay"><div class="anim-pop" id="anim-pop"></div></div>
<div id="combo-pop"></div>
<div id="bonus-pop"></div>

<script>
// ╔══════════════════════════════════════════════════════════╗
// ║      ★ 문제 & 설정 — 특보가 바뀔 때 여기만 수정하세요! ★   ║
// ╚══════════════════════════════════════════════════════════╝

// ★ 특보 호수 — 새 호수 받으면 이 숫자만 바꾸세요! (2, 3, 4...)
//   호수가 바뀌면 이전 랭킹 기록이 자동으로 사라져요.
const ISSUE_NUM = 3;

// ── Firebase 설정 ──────────────────────────────────────
// ★ Firebase 콘솔 → 프로젝트 설정 → 내 앱 → firebaseConfig 복사 ★
const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT.firebaseapp.com",
  databaseURL:       "YOUR_DATABASE_URL",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID",
};

const FB_READY = firebaseConfig.apiKey !== "YOUR_API_KEY";

// ── 내부 상태 ────────────────────────────────────────────
let _db       = null;            // Firebase DB 인스턴스
let _fbOnline = false;           // SDK 로드 성공 여부
const PENDING_KEY = `soyodo_pending_v${ISSUE_NUM}`; // 저장 대기 큐 key

// ── SDK 동적 로드 (재시도 포함) ──────────────────────────
function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload  = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function initFirebase(retry = 0) {
  const MAX_RETRY = 3;
  const DELAY_MS  = [1000, 2000, 4000];
  try {
    await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
    await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js');
    const app = firebase.initializeApp(firebaseConfig);
    _db = firebase.database(app);
    _fbOnline = true;
    // 대기 중인 점수 일괄 전송
    flushPending();
    // 랭킹 새로고침
    renderStartLB();
  } catch(e) {
    if (retry < MAX_RETRY) {
      setTimeout(() => initFirebase(retry + 1), DELAY_MS[retry] || 4000);
    } else {
      console.warn('Firebase SDK 로드 실패 — 로컬 모드로 작동');
    }
  }
}

// ── 대기 큐: 오프라인 중 저장 실패한 점수 보관 ───────────
function enqueuePending(payload) {
  try {
    const q = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]');
    // 같은 이름이 있으면 더 높은 점수만 유지
    const idx = q.findIndex(r => r.name === payload.name);
    if (idx >= 0) {
      if (payload.score > q[idx].score) q[idx] = payload;
    } else {
      q.push(payload);
    }
    localStorage.setItem(PENDING_KEY, JSON.stringify(q));
  } catch(e) {}
}

async function flushPending() {
  if (!_fbOnline || !_db) return;
  try {
    const q = JSON.parse(localStorage.getItem(PENDING_KEY) || '[]');
    if (!q.length) return;
    for (const p of q) {
      await fbWriteOne(p.name, p.score, p.correct, p.diff, p.rank);
    }
    localStorage.removeItem(PENDING_KEY);
  } catch(e) {}
}

// ── Firebase 단건 쓰기 ────────────────────────────────────
function fbKey(name) {
  return name.replace(/[.#$[\]\/]/g, '_');
}

function fbPath() {
  return `leaderboard_v${ISSUE_NUM}`;
}

async function fbWriteOne(name, score, correct, diffKey, rank) {
  if (!_db) return false;
  try {
    const key  = fbKey(name);
    const ref  = _db.ref(fbPath() + '/' + key);
    const snap = await Promise.race([
      ref.once('value'),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 3000)),
    ]);
    const existing = snap.val();
    if (existing && existing.score >= score) return true; // 기존이 더 높으면 스킵
    await ref.set({ name, score, correct, diff: diffKey, rank, at: Date.now() });
    return true;
  } catch(e) { return false; }
}

// ── 저장: 실패하면 큐에 보관 ─────────────────────────────
async function fbSaveScore(name, score, correct, diffKey, rank) {
  if (!FB_READY) return;
  const payload = { name, score, correct, diff: diffKey, rank };
  if (!_fbOnline) {
    enqueuePending(payload);
    return;
  }
  const ok = await fbWriteOne(name, score, correct, diffKey, rank);
  if (!ok) enqueuePending(payload);
}

// ── 불러오기: 실패하면 캐시 사용 ─────────────────────────
const LB_CACHE_KEY = `soyodo_lb_cache_v${ISSUE_NUM}`;

async function fbLoadLB() {
  if (!FB_READY) return null;
  if (!_fbOnline || !_db) {
    // SDK 아직 로드 중 → 캐시 반환
    return getCachedLB();
  }
  try {
    const snap = await Promise.race([
      _db.ref(fbPath()).once('value'),
      new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 4000)),
    ]);
    const data = snap.val();
    if (!data) return [];
    const lb = Object.values(data)
      .filter(r => r && r.name)
      .sort((a, b) => b.score - a.score || b.correct - a.correct)
      .slice(0, 30);
    // 성공하면 캐시 갱신
    try { localStorage.setItem(LB_CACHE_KEY, JSON.stringify(lb)); } catch(e) {}
    return lb;
  } catch(e) {
    // 실패 → 캐시 반환
    return getCachedLB();
  }
}

function getCachedLB() {
  try {
    const cached = localStorage.getItem(LB_CACHE_KEY);
    return cached ? JSON.parse(cached) : null;
  } catch(e) { return null; }
}

async function fbClearAll() {
  if (!FB_READY || !_db) return;
  try { await _db.ref(fbPath()).remove(); } catch(e) {}
  try { localStorage.removeItem(LB_CACHE_KEY); } catch(e) {}
}
const LB_KEY = `soyodo_lb_v${ISSUE_NUM}`;
const MAX_LB  = 20;             // 저장할 최대 기록 수
let playerName = '';

/* ── 이름 화면 ── */
function confirmName() {
  const v = document.getElementById('name-inp').value.trim();
  if (!v) {
    showNameErr('이름을 입력해야 수사를 시작할 수 있어요!');
    document.getElementById('name-inp').focus();
    return;
  }
  clearNameErr();
  playerName = v;
  startGame();
}

function showNameErr(msg) {
  const err = document.getElementById('name-err');
  if (!err) return;
  err.style.cssText = 'display:block;padding:9px 12px;border-radius:8px;font-size:13px;margin-bottom:.75rem;background:#fcebeb;color:#a32d2d;border:0.5px solid #e24b4a';
  err.textContent = msg;
}

function clearNameErr() {
  const err = document.getElementById('name-err');
  if (!err) return;
  err.style.cssText = '';
  err.textContent = '';
}


function resetStartBtn() {
  const btn = document.querySelector('#s-start .start-btn');
  if (btn) { btn.textContent = '수사 시작! 🔍'; btn.onclick = confirmName; }
  clearNameErr();
}


document.getElementById('name-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmName();
});
document.getElementById('name-inp').addEventListener('input', () => {
  resetStartBtn();
});

// 시작 화면 랭킹 렌더
function renderStartLB() {
  const titleEl = document.getElementById('start-lb-title');
  const listEl  = document.getElementById('start-lb-list');
  if (!listEl) return;

  // 로컬 기록 즉시 표시 (블로킹 없음)
  const localLB = loadLB();
  if (FB_READY) {
    if (titleEl) titleEl.textContent = '🏆 전체 반 랭킹';
    if (localLB.length) renderLBInto(listEl, localLB, -1);
    else listEl.innerHTML = '<div class="lb-empty" style="color:var(--text3)">　</div>';
    // Firebase는 백그라운드 — 응답 오면 조용히 교체
    fbLoadLB().then(fbLB => {
      if (!listEl.isConnected) return;
      if (fbLB && fbLB.length) renderLBInto(listEl, fbLB, -1);
      else if (!localLB.length) listEl.innerHTML = '<div class="lb-empty">아직 기록이 없어요. 첫 번째 기자가 되어봐요!</div>';
    });
  } else {
    if (titleEl) titleEl.textContent = '🏆 현재 랭킹 (이 기기)';
    if (!localLB.length) listEl.innerHTML = '<div class="lb-empty">아직 기록이 없어요. 첫 번째 기자가 되어봐요!</div>';
    else renderLBInto(listEl, localLB, -1);
  }
}

function clearLeaderboardFromStart() {
  if (!confirm('기록을 모두 지울까요?')) return;
  localStorage.removeItem(LB_KEY);
  renderStartLB();
}

/* ── 랭킹 저장/불러오기 ── */
function loadLB() {
  try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; }
  catch { return []; }
}

function saveLB(lb) {
  try { localStorage.setItem(LB_KEY, JSON.stringify(lb)); } catch {}
}

function saveScore(name, score, correct, diffKey, rank) {
  const lb = loadLB();
  const existing = lb.findIndex(r => r.name === name);
  if (existing >= 0) {
    if (score > lb[existing].score) {
      lb[existing] = { name, score, correct, diff: diffKey, rank, at: Date.now() };
    }
    // 낮은 점수면 기존 유지
  } else {
    lb.push({ name, score, correct, diff: diffKey, rank, at: Date.now() });
  }
  lb.sort((a, b) => b.score - a.score || b.correct - a.correct);
  if (lb.length > MAX_LB) lb.length = MAX_LB;
  saveLB(lb);
  return lb;
}

function clearLeaderboard() {
  if (!confirm('기록을 모두 지울까요?')) return;
  localStorage.removeItem(LB_KEY);
  renderLB([], -1);
  document.getElementById('my-rank-box').style.display = 'none';
  renderStartLB(); // 시작 화면 랭킹도 갱신
}

function renderLBInto(listEl, lb, myIdx) {
  if (!lb || !lb.length) {
    listEl.innerHTML = '<div class="lb-empty">아직 기록이 없어요!</div>';
    return;
  }
  const diffLabel = { easy:'쉬움', normal:'보통', hard:'어려움' };
  const medals = ['🥇','🥈','🥉'];
  listEl.innerHTML = lb.slice(0, 15).map((r, i) => {
    const isMe = i === myIdx;
    const medal = medals[i] || (i + 1) + '위';
    const name = r.name || '???';
    const score = r.score ?? 0;
    const rank = r.rank || '-';
    const diffTxt = diffLabel[r.diff] || r.diff || '';
    return `<div class="lb-row${isMe ? ' me' : (i === 0 ? ' top1' : '')}">
      <span class="lb-rank">${medal}</span>
      <span class="lb-name">${name}${isMe ? ' ← 나' : ''}</span>
      <span class="lb-score">${score}pt</span>
      <span class="lb-diff">${rank}등급 · ${diffTxt}</span>
    </div>`;
  }).join('');
}

function renderLB(lb, myIdx) {
  const list = document.getElementById('lb-list');
  const title = document.querySelector('.lb-title span');
  if (title) title.textContent = FB_READY ? '🏆 전체 반 랭킹' : '🏆 이 기기 랭킹';
  renderLBInto(list, lb, myIdx);
}

/* ── 결과에 랭킹 연동 ── */
async function saveAndShowRank(score, correct, diffKey, rank) {
  // localStorage에도 항상 저장 (오프라인 대비)
  const localLB = saveScore(playerName, score, correct, diffKey, rank);

  if (FB_READY) {
    // Firebase 저장
    await fbSaveScore(playerName, score, correct, diffKey, rank);
    // Firebase에서 전체 랭킹 불러오기
    const fbLB = await fbLoadLB();
    if (fbLB) {
      const myIdx = fbLB.findIndex(r => r.name === playerName);
      showMyRankBox(myIdx, fbLB.length, true);
      renderLB(fbLB, myIdx);
      return;
    }
  }

  // Firebase 없으면 localStorage 랭킹
  const myIdx = localLB.findIndex(r => r.name === playerName);
  showMyRankBox(myIdx, localLB.length, false);
  renderLB(localLB, myIdx);
}

function showMyRankBox(myIdx, total, isGlobal) {
  const box = document.getElementById('my-rank-box');
  if (myIdx < 0) { box.style.display = 'none'; return; }
  const pos = myIdx + 1;
  const scope = isGlobal ? '전체 반' : '이 기기';
  box.style.display = 'block';
  box.textContent = pos <= 3
    ? `🎉 ${scope} ${pos}위! 대단해요!`
    : `${scope} 내 등수: ${pos}위 / ${total}명`;
}


// URL에 ?admin 또는 #admin 이 있으면 선생님 모드
if (location.search.includes('admin') || location.hash.includes('admin')) {
  document.body.classList.add('admin');
}

if (FB_READY) initFirebase(); // 백그라운드 로드 시작 (재시도 포함)

init();
renderStartLB();
</script>
